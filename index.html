<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>九重紫 -Jiuchong Zi- 个人主页</title>
    
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        /* =========================================
           ✨ 基础设定 & 引入可爱字体 & 人物背景 ✨
           ========================================= */
        body {
            background-color: #fdf8f9; 
            background-image: linear-gradient(-45deg, #fff0f5, #ffe4e1, #ffd1df, #fff0f5); 
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; 
            font-family: 'ZCOOL KuaiLe', 'Nunito', 'Yuanti SC', 'YouYuan', 'PingFang SC', sans-serif;
            font-weight: normal; 
            margin: 0; padding: 0; color: #4a4a4a; min-height: 100vh; line-height: 1.8; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .background-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('images/bg-character.png'); 
            background-size: cover; 
            background-position: center center; 
            background-repeat: no-repeat;
            z-index: -3; pointer-events: none; opacity: 0.75; 
        }

        .bg-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.45); 
            z-index: -2; pointer-events: none;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* =========================================
           ✨ 主容器 (居中布局) ✨
           ========================================= */
        .content-area {
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px); 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(216, 112, 147, 0.15); padding: 35px 40px;
            border: 1px solid rgba(255, 255, 255, 0.5); width: 95%; max-width: 900px; box-sizing: border-box;
            position: relative;
        }

        h2 { 
            color: #d87093; margin-bottom: 20px; font-size: 28px; text-align: center; border-left: none; padding-left: 0; font-weight: normal; text-transform: uppercase; letter-spacing: 1px;
        }

        /* =========================================
           🎉 历程渲染与天数计算逻辑 🎉
           ========================================= */
        .milestone-counter {
            text-align: center;
            margin-bottom: 40px;
            background: rgba(255, 209, 223, 0.3);
            border-radius: 20px;
            padding: 20px;
            border: 2px dashed #ff9cbd;
        }

        .milestone-counter p {
            color: #666;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 18px;
        }

        .days-display {
            color: #d87093;
            font-size: 50px;
            font-family: 'ZCOOL KuaiLe', sans-serif;
            text-shadow: 2px 2px 5px rgba(216, 112, 147, 0.2);
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 8px;
        }

        .timeline {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
            padding-left: 50px; /* 增加左侧内边距，为自定义图标留出空间 */
            border-left: 4px solid #ffd1df;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 40px;
            padding-left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(216, 112, 147, 0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(216, 112, 147, 0.1);
            display: flex; flex-direction: column; align-items: flex-start;
        }

        .timeline-item:hover {
            transform: translateX(10px) scale(1.03);
            box-shadow: 0 12px 25px rgba(216, 112, 147, 0.3);
            border-color: #ff9cbd;
        }

        /* 自定义历程图标：替换丑陋的圆点/星星 ⭐ */
        .timeline-icon {
            position: absolute;
            left: -65px; /* 图标中心对齐时间轴线 */
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background-color: #fff;
            border: 4px solid #d87093;
            border-radius: 50%; /* 保持原型，但中间放高质量图标 */
            box-shadow: 0 0 15px rgba(216, 112, 147, 0.4);
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* 裁剪超出部分 */
        }

        /* 这里是你可以放置具体图标的地方。
           为了兼容性，我默认使用 SVG 图标占位。
           你可以将 data:image/svg+xml 替换为具体图标的图片路径，例如：
           background-image: url('images/icons/debut.png');
        */
        .timeline-icon::after {
            content: '';
            display: block;
            width: 30px;
            height: 30px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 默认占位图标，你可以根据不同节点更换样式 */
        .timeline-item .timeline-icon::after { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23d87093'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z'/></svg>"); }

        /* 特殊节点更换特定图标示例 */
        .timeline-item[data-icon="debut"] .timeline-icon::after { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23d87093'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9v-2h2v2zm0-4H9V7h2v5zm4 4h-2v-2h2v2zm0-4h-2V7h2v5z'/></svg>"); }
        .timeline-item[data-icon="follower"] .timeline-icon::after { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23d87093'><path d='M12 2c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm9 7h-6v13h-2v-6h-2v6H9V9H3V7h18v2z'/></svg>"); }
        .timeline-item[data-icon="3d"] .timeline-icon::after { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23d87093'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4 11h-2v2h2v-2zm-1.5-6.5l-3 3-1.5-1.5L8.5 7l2.5 2.5 4-4 1.5 1.5zm-2.5 11h-2v2h2v-2zm3-3h-2v2h2v-2z'/></svg>"); }

        .timeline-date {
            font-weight: bold;
            color: #d87093;
            margin-bottom: 8px;
            font-size: 18px;
            border-bottom: 1px dashed #ffd1df;
            display: inline-block;
            padding-bottom: 3px;
        }

        .timeline-content {
            color: #4a4a4a;
            font-size: 16px;
            margin-top: 10px;
        }

        .timeline-detail {
            display: block;
            font-size: 14px;
            color: #888;
            margin-top: 8px;
            line-height: 1.6;
        }

        /* GUESTBOOK 按钮在内容区域右下角 */
        .guestbook-link-container {
            text-align: right;
            margin-top: 30px;
        }
        .guestbook-btn {
            background-color: #d87093;
            color: #fff;
            padding: 12px 24px;
            border-radius: 24px;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(216, 112, 147, 0.2);
        }
        .guestbook-btn:hover {
            background-color: #ff9cbd;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .content-area { padding: 25px 20px; border-radius: 20px; }
            .timeline { padding-left: 30px; }
            .timeline-item { padding: 15px; }
            .timeline-icon { left: -45px; width: 40px; height: 40px; border-width: 3px; }
            .timeline-icon::after { width: 22px; height: 22px; }
        }
    </style>
</head>
<body>

    <div class="background-image"></div>
    <div class="bg-mask"></div>

    <div class="page-container">
        <div class="content-area" data-aos="fade-up">
            <h2 data-key="nav_milestone">历程 / MILESTONES</h2>
            
            <div class="milestone-counter">
                <p data-key="ms_counter_prefix">紫老师已活跃</p>
                <div class="days-display"><span id="live-days">...</span> <span style="font-size: 20px;" data-key="ms_days">天</span></div>
            </div>

            <div class="timeline" id="milestone-timeline">
                </div>

            <div class="guestbook-link-container">
                <a href="#guestbook" class="guestbook-btn" data-key="nav_guestbook">GUESTBOOK</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // =========================================
        // ✨ AOS 滚动加载动画初始化 ✨
        // =========================================
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof AOS !== 'undefined') {
                AOS.init({ once: false, offset: 60, duration: 800, easing: 'ease-out-cubic' });
            }
        });

        // =========================================
        // ✨ 历程精选配置区 (数据精简提炼自萌娘百科) ✨
        // =========================================
        const milestonesData = [
            { date: '2020年6月9日', icon: 'debut', cn: '在bilibili进行初次投稿 📺', jp: 'bilibili初投稿 📺' },
            { date: '2020年11月10日', icon: 'debut', cn: '成功进行bilibili首次直播 🎙️', jp: '初のbilibili配信 🎙️' },
            { date: '2020年11月18日', icon: 'follower', cn: 'bilibili粉丝数突破1万 🎉<br><span class="timeline-detail">因为一个整活视频，1天内粉丝从二三百暴涨到一万。</span>', jp: 'bilibiliフォロワー数1万人突破 🎉<br><span class="timeline-detail">ネタ動画が大ウケし、1日でフォロワーが数百人から1万人に急増。</span>' },
            { date: '2021年8月21日', icon: 'debut', cn: '发布第二套正式形象 👗', jp: '2nd公式モデル発表 👗' },
            { date: '2022年2月23日', icon: 'follower', cn: 'bilibili粉丝数突破20万 🎈', jp: 'bilibiliフォロワー数20万人突破 🎈' },
            { date: '2022年4月1日', icon: 'debut', cn: '愚人节整活大危机 🐱<br><span class="timeline-detail">“猫猫”代播放出奇怪文件，造就了经典的一天。</span>', jp: 'エイプリルフール企画 🐱<br><span class="timeline-detail">「猫ちゃん」が配信を乗っ取り、色々とやばいファイルが流出するハプニングが発生。</span>' },
            { date: '2022年7月23日', icon: 'debut', cn: '生日回首次达成10名提督成就 🚢', jp: '誕生日配信で初の提督10人達成 🚢' },
            { date: '2022年9月16日', icon: 'debut', cn: '宣布开设官方字幕组 📝', jp: '公式字幕組の設立を発表 📝' },
            { date: '2022年11月6日', icon: 'follower', cn: 'bilibili粉丝数突破30万 👑', jp: 'bilibiliフォロワー数30万人突破 👑' },
            { date: '2024年5月28日', icon: 'follower', cn: 'bilibili粉丝数突破50万 🌟', jp: 'bilibiliフォロワー数50万人突破 🌟' },
            { date: '2025年2月4日', icon: '3d', cn: '举办九重紫4周年＆3D化纪念会 🎊', jp: '九重紫4周年＆3D化記念配信 🎊' },
            { date: '2025年12月25日', icon: 'debut', cn: '超美丽3D圣诞直播 🎄<br><span class="timeline-detail">开启漫无止境的圣诞节头像活动，共计绘制头像772张。</span>', jp: '超美麗3Dクリスマス配信 🎄<br><span class="timeline-detail">終わらないクリスマスアイコン描き企画がスタート（計772枚作成）。</span>' },
            { date: '2026年2月1日', icon: 'debut', cn: '登顶全站热门 🔥<br><span class="timeline-detail">投稿视频《总有人看了点哔哩哔哩就以为自己会说中文了》大受好评。</span>', jp: '全休人気ランキング入り 🔥<br><span class="timeline-detail">中国語ネタ動画が大好評で、久々に全サイトのトレンド入り。</span>' },
            { date: '2026年2月16日', icon: 'follower', cn: '除夕夜直播 & 突破60万粉 🧨<br><span class="timeline-detail">新年到来之际，戴上马年头饰迎来了60万粉丝的时刻。</span>', jp: '大晦日配信 & 60万人フォロワー突破 🧨<br><span class="timeline-detail">新年の訪れとともに、馬の髪飾りをつけて60万人突破の瞬間を迎えた。</span>' },
            { date: '2026年2月23日', icon: 'follower', cn: '2222天纪念日 ✨<br><span class="timeline-detail">迎来以九重紫名义使用bilibili账号的第2222天。</span>', jp: '2222日記念日 ✨<br><span class="timeline-detail">九重紫としてbilibili活動2222日目を迎える。</span>' }
        ];

        // =========================================
        // 🎉 历程渲染与天数计算逻辑 🎉
        // =========================================
        function renderMilestones() {
            const timeline = document.getElementById('milestone-timeline');
            if (!timeline) return;
            const currentLang = 'cn'; // 默认语言
            
            timeline.innerHTML = milestonesData.map((item, index) => `
                <div class="timeline-item" data-aos="fade-up" data-aos-delay="${Math.min(index * 50, 400)}" data-icon="${item.icon}">
                    <div class="timeline-icon"></div>
                    <div class="timeline-date">${item.date}</div>
                    <div class="timeline-content">${item[currentLang]}</div>
                </div>
            `).join('');
        }

        function updateDaysCounter() {
            const daysEl = document.getElementById('live-days');
            if (!daysEl) return;

            // 核心逻辑：以 2026年2月23日 作为 第2222天的锚点
            const anchorDate = new Date('2026-02-23T00:00:00+08:00');
            const today = new Date();
            
            // 计算时差并转为天数
            const diffTime = today.getTime() - anchorDate.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 3600 * 24));
            
            // 基础锚点2222天 + 相差的天数
            const targetDays = 2222 + diffDays;

            // 跳动数字动画效果
            let currentVal = 0;
            const duration = 1500;
            const interval = 30;
            const step = Math.ceil(targetDays / (duration / interval));

            const timer = setInterval(() => {
                currentVal += step;
                if (currentVal >= targetDays) {
                    daysEl.innerText = targetDays;
                    clearInterval(timer);
                } else {
                    daysEl.innerText = currentVal;
                }
            }, interval);
        }

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            renderMilestones();
            updateDaysCounter();
        });
    </script>

</body>
</html>
